<!DOCTYPE html>
<!--

-->
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Contacte le support Mila pour une question sur l’app, un abonnement ou ton compte."
    />
    <meta name="theme-color" content="#EE725B" />
    <title>Support — Mila</title>
    <link rel="icon" type="image/png" href="assets/images/logo-mila.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/legal.css" />
    <link rel="stylesheet" href="css/support.css" />

  <body class="legal-page">
    <a class="skip-link" href="#support-content">Aller au contenu</a>

    <header class="legal-header">
      <div class="legal-header__inner">
        <a class="brand" href="index.html" aria-label="Mila — accueil">
          <img
            class="brand__mark"
            src="assets/images/logo-mila.png"
            width="36"
            height="36"

        <a class="legal-header__back" href="index.html">← Retour</a>

    </header>

    <main class="legal-main" id="support-content">
      <header class="legal-hero">
        <div class="legal-hero__brand">
          <img src="assets/images/logo-mila.png" width="40" height="40" alt="" />

        <p class="legal__meta">

    <footer class="legal-footer">
      <div class="legal-footer__inner">
        <p>© <span data-year></span> STELYA — Mila</p>
        <p>
          <a href="cgu.html">CGU</a>
          ·
          <a href="privacy.html">Confidentialité</a>
          ·
          <a href="index.html">Accueil</a>

    <script src="js/support.js" defer></script>
    <script src="js/main.js" defer></script>
